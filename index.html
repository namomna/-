<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>랜덤 암기 카드</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    color: #222;
  }

  header {
    padding: 20px 16px 10px;
    text-align: center;
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  h1 {
    margin: 0 0 12px;
    font-size: 28px;
  }

  .top-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  button {
    border: none;
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
  }

  .mode-btn {
    background: #2d6cdf;
    color: white;
  }

  .mode-btn.secondary {
    background: #2ea44f;
  }

  .random-btn {
    background: #f39c12;
    color: white;
    font-weight: bold;
  }

  .sub-info {
    margin-top: 8px;
    font-size: 15px;
    color: #444;
  }

  main {
    max-width: 1100px;
    margin: 24px auto;
    padding: 0 16px 80px;
  }

  .card-wrap {
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 20px;
    min-height: 520px;
  }

  .card-mode {
    font-size: 14px;
    color: #666;
    margin-bottom: 12px;
  }

  .card {
    border: 2px dashed #cfd6dd;
    border-radius: 16px;
    min-height: 420px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    background: #fafbfd;
    transition: 0.2s;
  }

  .card.clickable {
    cursor: pointer;
  }

  .card-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 14px;
    color: #2d6cdf;
  }

  .card-text {
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 17px;
    margin-bottom: 18px;
  }

  .card img {
    max-width: 100%;
    max-height: 520px;
    border-radius: 12px;
    border: 1px solid #ddd;
    object-fit: contain;
    background: white;
  }

  .quiz-area {
    margin-top: 18px;
    display: none;
  }

  .quiz-area textarea {
    width: 100%;
    min-height: 180px;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #bbb;
    font-size: 16px;
    resize: vertical;
    background: white;
  }

  .quiz-actions {
    margin-top: 12px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .result {
    margin-top: 14px;
    font-size: 17px;
    font-weight: bold;
    white-space: pre-wrap;
  }

  .correct {
    color: #1f8b24;
  }

  .wrong {
    color: #c62828;
  }

  .empty {
    text-align: center;
    color: #777;
    font-size: 18px;
    padding-top: 120px;
  }

  #addBtn {
    position: fixed;
    right: 22px;
    bottom: 22px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 34px;
    background: #111;
    color: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  }

  .form-panel {
    display: none;
    margin-top: 24px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 20px;
  }

  .form-panel h2 {
    margin-top: 0;
    margin-bottom: 18px;
  }

  .field {
    margin-bottom: 18px;
    text-align: left;
  }

  .field label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
  }

  .field textarea {
    width: 100%;
    min-height: 420px;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #bbb;
    font-size: 16px;
    resize: vertical;
    line-height: 1.5;
  }

  .field input[type="file"] {
    display: block;
    margin-top: 8px;
  }

  .preview-box {
    margin-top: 10px;
  }

  .preview-box img {
    max-width: 100%;
    max-height: 300px;
    border: 1px solid #ddd;
    border-radius: 10px;
    background: white;
  }

  .form-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .small-btn {
    background: #444;
    color: white;
  }

  .save-btn {
    background: #2ea44f;
    color: white;
  }

  .danger-btn {
    background: #c62828;
    color: white;
  }

  @media (max-width: 768px) {
    .field textarea {
      min-height: 280px;
    }

    .card {
      min-height: 340px;
    }

    .quiz-area textarea {
      min-height: 140px;
    }
  }
</style>
</head>
<body>
  <header>
    <h1>랜덤 암기 카드</h1>
    <div class="top-buttons">
      <button class="mode-btn" onclick="setMode('quiz')">문제 모드</button>
      <button class="mode-btn secondary" onclick="setMode('view')">정답 보기 모드</button>
      <button class="random-btn" onclick="drawRandomCard()">랜덤 버튼</button>
    </div>
    <div class="sub-info" id="countInfo">현재 등록된 문제 수: 0개</div>
    <div class="sub-info" id="modeInfo">현재 모드: 문제 모드</div>
  </header>

  <main>
    <section class="card-wrap">
      <div class="card-mode" id="cardModeText">랜덤 버튼을 눌러 문제를 불러오세요.</div>

      <div id="card" class="card">
        <div class="empty">아직 표시된 문제가 없습니다.<br>상단의 랜덤 버튼을 눌러 시작하세요.</div>
      </div>

      <div class="quiz-area" id="quizArea">
        <textarea id="answerInput" placeholder="여기에 답을 작성하세요"></textarea>
        <div class="quiz-actions">
          <button class="mode-btn" onclick="checkAnswer()">정답 확인</button>
          <button class="small-btn" onclick="clearAnswerInput()">입력 지우기</button>
        </div>
        <div class="result" id="result"></div>
      </div>
    </section>

    <section class="form-panel" id="addForm">
      <h2>문제 추가</h2>

      <div class="field">
        <label for="newQuestion">문제 내용</label>
        <textarea id="newQuestion" placeholder="문제를 입력하세요. 긴 내용도 작성할 수 있습니다."></textarea>
      </div>

      <div class="field">
        <label for="questionImage">문제 이미지</label>
        <input type="file" id="questionImage" accept="image/*" onchange="previewImage(event, 'questionPreview')" />
        <div class="preview-box" id="questionPreview"></div>
      </div>

      <div class="field">
        <label for="newAnswer">정답 내용</label>
        <textarea id="newAnswer" placeholder="정답을 입력하세요. 긴 내용도 작성할 수 있습니다."></textarea>
      </div>

      <div class="field">
        <label for="answerImage">정답 이미지</label>
        <input type="file" id="answerImage" accept="image/*" onchange="previewImage(event, 'answerPreview')" />
        <div class="preview-box" id="answerPreview"></div>
      </div>

      <div class="form-actions">
        <button class="save-btn" onclick="addCard()">저장하기</button>
        <button class="small-btn" onclick="toggleAddForm()">닫기</button>
      </div>
    </section>
  </main>

  <button id="addBtn" onclick="toggleAddForm()">+</button>

<script>
  const STORAGE_KEY = "flashcard_app_cards_v2";

  let cards = [];
  let currentCard = null;
  let currentMode = "quiz";
  let showingAnswer = false;

  function defaultCards() {
    return [
      {
        question: "대한민국의 수도는?",
        questionImage: "",
        answer: "서울",
        answerImage: ""
      },
      {
        question: "옴의 법칙 공식은?",
        questionImage: "",
        answer: "V = I × R",
        answerImage: ""
      }
    ];
  }

  function saveCards() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
  }

  function loadCards() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        cards = JSON.parse(saved);
      } catch (e) {
        cards = defaultCards();
      }
    } else {
      cards = defaultCards();
      saveCards();
    }
  }

  function updateCount() {
    document.getElementById("countInfo").innerText = `현재 등록된 문제 수: ${cards.length}개`;
  }

  function updateModeText() {
    document.getElementById("modeInfo").innerText =
      `현재 모드: ${currentMode === "quiz" ? "문제 모드" : "정답 보기 모드"}`;
  }

  function setMode(mode) {
    currentMode = mode;
    updateModeText();
    document.getElementById("result").innerText = "";
    if (mode === "quiz") {
      document.getElementById("quizArea").style.display = "block";
      document.getElementById("cardModeText").innerText = "문제 모드입니다. 랜덤 버튼을 누른 뒤 답을 작성하고 정답 확인을 누르세요.";
    } else {
      document.getElementById("quizArea").style.display = "none";
      document.getElementById("cardModeText").innerText = "정답 보기 모드입니다. 랜덤 버튼을 누른 뒤 문제 카드를 클릭하면 정답을 볼 수 있습니다.";
    }
  }

  function getRandomCard() {
    if (cards.length === 0) return null;
    const index = Math.floor(Math.random() * cards.length);
    return cards[index];
  }

  function drawRandomCard() {
    if (cards.length === 0) {
      renderEmpty("등록된 문제가 없습니다. + 버튼으로 문제를 추가하세요.");
      return;
    }

    currentCard = getRandomCard();
    showingAnswer = false;
    clearAnswerInput();
    document.getElementById("result").innerText = "";

    if (currentMode === "quiz") {
      renderQuestionCard(currentCard);
      document.getElementById("quizArea").style.display = "block";
    } else {
      renderQuestionCard(currentCard, true);
      document.getElementById("quizArea").style.display = "none";
    }
  }

  function renderEmpty(message) {
    const card = document.getElementById("card");
    card.className = "card";
    card.innerHTML = `<div class="empty">${message}</div>`;
  }

  function renderQuestionCard(cardData, clickable = false) {
    const card = document.getElementById("card");
    card.className = clickable ? "card clickable" : "card";

    let imageHtml = "";
    if (cardData.questionImage) {
      imageHtml = `<img src="${cardData.questionImage}" alt="문제 이미지">`;
    }

    card.innerHTML = `
      <div class="card-title">문제</div>
      <div class="card-text">${escapeHtml(cardData.question || "")}</div>
      ${imageHtml}
    `;

    if (clickable) {
      card.onclick = flipCard;
    } else {
      card.onclick = null;
    }
  }

  function renderAnswerCard(cardData) {
    const card = document.getElementById("card");
    card.className = "card clickable";

    let imageHtml = "";
    if (cardData.answerImage) {
      imageHtml = `<img src="${cardData.answerImage}" alt="정답 이미지">`;
    }

    card.innerHTML = `
      <div class="card-title">정답</div>
      <div class="card-text">${escapeHtml(cardData.answer || "")}</div>
      ${imageHtml}
    `;

    card.onclick = flipCard;
  }

  function flipCard() {
    if (!currentCard || currentMode !== "view") return;

    if (showingAnswer) {
      showingAnswer = false;
      renderQuestionCard(currentCard, true);
    } else {
      showingAnswer = true;
      renderAnswerCard(currentCard);
    }
  }

  function checkAnswer() {
    if (!currentCard) {
      alert("먼저 랜덤 버튼을 눌러 문제를 불러오세요.");
      return;
    }

    const userAnswer = document.getElementById("answerInput").value.trim();
    const result = document.getElementById("result");

    if (userAnswer.length === 0) {
      alert("답을 입력하세요.");
      return;
    }

    const correctAnswer = (currentCard.answer || "").trim();

    if (userAnswer === correctAnswer) {
      result.className = "result correct";
      result.innerText = `정답입니다.\n\n정답: ${correctAnswer}`;
    } else {
      result.className = "result wrong";
      result.innerText = `오답입니다.\n\n정답: ${correctAnswer}`;
    }
  }

  function clearAnswerInput() {
    document.getElementById("answerInput").value = "";
  }

  function toggleAddForm() {
    const form = document.getElementById("addForm");
    form.style.display = form.style.display === "block" ? "none" : "block";
  }

  function previewImage(event, previewId) {
    const file = event.target.files[0];
    const preview = document.getElementById(previewId);

    if (!file) {
      preview.innerHTML = "";
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      preview.innerHTML = `<img src="${e.target.result}" alt="미리보기">`;
    };
    reader.readAsDataURL(file);
  }

  function fileToDataURL(file) {
    return new Promise((resolve) => {
      if (!file) {
        resolve("");
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  async function addCard() {
    const question = document.getElementById("newQuestion").value.trim();
    const answer = document.getElementById("newAnswer").value.trim();
    const questionFile = document.getElementById("questionImage").files[0];
    const answerFile = document.getElementById("answerImage").files[0];

    if (!question && !questionFile) {
      alert("문제 내용 또는 문제 이미지를 넣어주세요.");
      return;
    }

    if (!answer && !answerFile) {
      alert("정답 내용 또는 정답 이미지를 넣어주세요.");
      return;
    }

    const questionImage = await fileToDataURL(questionFile);
    const answerImage = await fileToDataURL(answerFile);

    cards.push({
      question,
      questionImage,
      answer,
      answerImage
    });

    saveCards();
    updateCount();

    document.getElementById("newQuestion").value = "";
    document.getElementById("newAnswer").value = "";
    document.getElementById("questionImage").value = "";
    document.getElementById("answerImage").value = "";
    document.getElementById("questionPreview").innerHTML = "";
    document.getElementById("answerPreview").innerHTML = "";

    alert("문제가 저장되었습니다.");
  }

  function escapeHtml(text) {
    return text
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  loadCards();
  updateCount();
  setMode("quiz");
</script>
</body>
</html>
