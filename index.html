<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>랜덤 암기 앱</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    padding: 0;
    background: #f5f5f5;
}

header {
    padding: 20px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}

#card {
    width: 300px;
    height: 200px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    font-size: 18px;
}

#answerInput {
    margin-top: 15px;
    padding: 8px;
    width: 250px;
}

#submitBtn {
    margin-top: 10px;
}

#addBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 30px;
    background: #2196F3;
    color: white;
    border: none;
}

#addForm {
    display: none;
    margin-top: 20px;
}
</style>
</head>
<body>

<header>
    <button onclick="startQuizMode()">문제 모드</button>
    <button onclick="startViewMode()">정답 보기 모드</button>
</header>

<div id="card">모드를 선택하세요</div>

<div id="quizArea" style="display:none;">
    <input type="text" id="answerInput" placeholder="답을 입력하세요">
    <br>
    <button id="submitBtn" onclick="checkAnswer()">제출</button>
</div>

<div id="addForm">
    <input type="text" id="newQuestion" placeholder="문제 입력"><br><br>
    <input type="text" id="newAnswer" placeholder="정답 입력"><br><br>
    <button onclick="addCard()">추가하기</button>
</div>

<button id="addBtn" onclick="toggleAddForm()">+</button>

<script>
let cards = [
    {question: "대한민국의 수도는?", answer: "서울"},
    {question: "2 + 2 = ?", answer: "4"}
];

let currentCard = null;
let mode = "";

function getRandomCard() {
    return cards[Math.floor(Math.random() * cards.length)];
}

function startQuizMode() {
    mode = "quiz";
    document.getElementById("quizArea").style.display = "block";
    currentCard = getRandomCard();
    document.getElementById("card").innerText = currentCard.question;
}

function startViewMode() {
    mode = "view";
    document.getElementById("quizArea").style.display = "none";
    currentCard = getRandomCard();
    document.getElementById("card").innerText = currentCard.question;

    document.getElementById("card").onclick = function() {
        if(mode === "view") {
            document.getElementById("card").innerText = currentCard.answer;
        }
    };
}

function checkAnswer() {
    let userAnswer = document.getElementById("answerInput").value.trim();
    if(userAnswer === currentCard.answer) {
        document.getElementById("card").innerText = "정답입니다!\n\n정답: " + currentCard.answer;
    } else {
        document.getElementById("card").innerText = "오답입니다!\n\n정답: " + currentCard.answer;
    }
}

function toggleAddForm() {
    let form = document.getElementById("addForm");
    form.style.display = form.style.display === "none" ? "block" : "none";
}

function addCard() {
    let q = document.getElementById("newQuestion").value.trim();
    let a = document.getElementById("newAnswer").value.trim();

    if(q && a) {
        cards.push({question: q, answer: a});
        alert("추가 완료!");
        document.getElementById("newQuestion").value = "";
        document.getElementById("newAnswer").value = "";
    } else {
        alert("문제와 답을 모두 입력하세요.");
    }
}
</script>

</body>
</html>
