<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>암기 카드 앱</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    color: #222;
  }

  header {
    padding: 20px 16px 12px;
    text-align: center;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 20;
  }

  h1 {
    margin: 0 0 12px;
    font-size: 28px;
  }

  .top-buttons,
  .filters,
  .quiz-actions,
  .viewer-actions,
  .form-actions,
  .list-actions,
  .stats-row,
  .backup-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .top-buttons,
  .filters,
  .backup-actions {
    justify-content: center;
    margin-bottom: 10px;
  }

  button {
    border: none;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 15px;
    cursor: pointer;
  }

  .mode-btn { background: #2d6cdf; color: white; }
  .green-btn { background: #2ea44f; color: white; }
  .orange-btn { background: #f39c12; color: white; }
  .purple-btn { background: #6f42c1; color: white; }
  .dark-btn { background: #111; color: white; }
  .gray-btn { background: #555; color: white; }
  .red-btn { background: #c62828; color: white; }
  .teal-btn { background: #00897b; color: white; }

  .sub-info {
    margin-top: 6px;
    font-size: 14px;
    color: #444;
  }

  main {
    max-width: 1150px;
    margin: 24px auto;
    padding: 0 16px 100px;
  }

  .panel {
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 20px;
    margin-bottom: 24px;
  }

  .card {
    border: 2px dashed #cfd6dd;
    border-radius: 16px;
    min-height: 380px;
    padding: 20px;
    background: #fafbfd;
  }

  .card-section {
    margin-bottom: 24px;
  }

  .card-title,
  .section-label {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 12px;
    color: #2d6cdf;
  }

  .card-text {
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 16px;
    margin-bottom: 12px;
  }

  .card img,
  .preview-box img,
  .list-item img {
    max-width: 100%;
    max-height: 500px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: white;
    display: block;
    margin-top: 10px;
  }

  .quiz-area textarea,
  .field textarea,
  input[type="text"],
  select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #bbb;
    font-size: 15px;
    background: white;
  }

  .quiz-area textarea {
    min-height: 150px;
    resize: vertical;
  }

  .field textarea {
    min-height: 260px;
    resize: vertical;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
  }

  .quiz-area,
  .form-panel,
  .list-panel,
  .stats-panel,
  .backup-panel {
    display: none;
  }

  .result {
    margin-top: 14px;
    font-size: 16px;
    font-weight: bold;
    white-space: pre-wrap;
  }

  .correct { color: #1f8b24; }
  .wrong { color: #c62828; }

  .empty {
    text-align: center;
    color: #777;
    font-size: 18px;
    padding-top: 110px;
  }

  .list-item {
    border: 1px solid #ddd;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    background: #fafbfd;
  }

  .list-number {
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 10px;
  }

  .meta {
    font-size: 14px;
    color: #666;
    margin-bottom: 8px;
  }

  .stats-box {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 14px;
    min-width: 160px;
    background: #fafbfd;
  }

  .small-note {
    font-size: 13px;
    color: #666;
    margin-top: 8px;
    line-height: 1.5;
  }

  #addBtn {
    position: fixed;
    right: 22px;
    bottom: 22px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 34px;
    background: #111;
    color: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  }

  @media (max-width: 768px) {
    h1 { font-size: 23px; }
    button { width: 100%; }
    .top-buttons, .filters, .quiz-actions, .viewer-actions, .form-actions, .list-actions, .stats-row, .backup-actions {
      flex-direction: column;
    }
    .field textarea { min-height: 200px; }
    .card { min-height: 300px; }
  }
</style>
</head>
<body>
<header>
  <h1>암기 카드 앱</h1>

  <div class="top-buttons">
    <button class="mode-btn" onclick="setMode('quiz')">문제 모드</button>
    <button class="green-btn" onclick="setMode('view')">정답 보기 모드</button>
    <button class="orange-btn" onclick="drawNextCard()">문제 시작 / 다음 문제</button>
    <button class="purple-btn" onclick="toggleListPanel()">전체 문제 보기</button>
    <button class="dark-btn" onclick="toggleStatsPanel()">통계 보기</button>
    <button class="teal-btn" onclick="toggleBackupPanel()">백업/복원</button>
  </div>

  <div class="filters">
    <select id="subjectFilter" onchange="applyFilters()">
      <option value="">전체 과목</option>
    </select>

    <input type="text" id="searchInput" placeholder="문제/정답/과목 검색" oninput="applyFilters()">

    <select id="orderMode" onchange="changeOrderMode()">
      <option value="random">랜덤 모드</option>
      <option value="sequence">순서 모드</option>
    </select>
  </div>

  <div class="sub-info" id="countInfo">전체 문제 수: 0개</div>
  <div class="sub-info" id="baseInfo">기본(JSON) 문제 수: 0개</div>
  <div class="sub-info" id="userInfo">추가 저장 문제 수: 0개</div>
  <div class="sub-info" id="filteredInfo">현재 필터 적용 문제 수: 0개</div>
  <div class="sub-info" id="modeInfo">현재 모드: 문제 모드</div>
</header>

<main>
  <section class="panel">
    <div id="cardModeText" class="sub-info" style="margin-bottom:12px;">
      문제 시작 / 다음 문제 버튼을 눌러 시작하세요.
    </div>

    <div id="card" class="card">
      <div class="empty">아직 표시된 문제가 없습니다.<br>상단의 문제 시작 / 다음 문제 버튼을 눌러 시작하세요.</div>
    </div>

    <div class="quiz-area" id="quizArea">
      <div class="field" style="margin-top:16px;">
        <textarea id="answerInput" placeholder="여기에 답을 입력하세요"></textarea>
      </div>

      <div class="quiz-actions">
        <button class="mode-btn" onclick="checkAnswer()">정답 확인</button>
        <button class="gray-btn" onclick="clearAnswerInput()">입력 지우기</button>
        <button class="dark-btn" onclick="drawNextCard()">다음 문제</button>
      </div>

      <div class="result" id="result"></div>
    </div>

    <div class="viewer-actions" id="viewerActions" style="display:none; margin-top:16px;">
      <button class="dark-btn" onclick="drawNextCard()">다음 문제</button>
    </div>
  </section>

  <section class="panel form-panel" id="addForm">
    <h2 id="formTitle">문제 추가</h2>

    <div class="field">
      <label for="newSubject">과목명</label>
      <input type="text" id="newSubject" placeholder="예: 전기자기학">
    </div>

    <div class="field">
      <label for="newQuestion">문제 내용</label>
      <textarea id="newQuestion" placeholder="문제를 입력하세요"></textarea>
    </div>

    <div class="field">
      <label for="questionImage">문제 이미지</label>
      <input type="file" id="questionImage" accept="image/*" onchange="previewImage(event, 'questionPreview')">
      <div class="preview-box" id="questionPreview"></div>
    </div>

    <div class="field">
      <label for="newAnswer">정답 내용</label>
      <textarea id="newAnswer" placeholder="정답을 입력하세요"></textarea>
    </div>

    <div class="field">
      <label for="answerImage">정답 이미지</label>
      <input type="file" id="answerImage" accept="image/*" onchange="previewImage(event, 'answerPreview')">
      <div class="preview-box" id="answerPreview"></div>
    </div>

    <div class="form-actions">
      <button class="green-btn" onclick="saveCard()">저장하기</button>
      <button class="gray-btn" onclick="resetForm()">입력 초기화</button>
      <button class="dark-btn" onclick="toggleAddForm()">닫기</button>
    </div>
  </section>

  <section class="panel list-panel" id="listPanel">
    <h2>전체 문제 목록</h2>
    <div class="list-actions" style="margin-bottom:16px;">
      <button class="gray-btn" onclick="toggleListPanel()">닫기</button>
    </div>
    <div id="allCardsList"></div>
  </section>

  <section class="panel stats-panel" id="statsPanel">
    <h2>정답률 통계</h2>
    <div class="list-actions" style="margin-bottom:16px;">
      <button class="gray-btn" onclick="toggleStatsPanel()">닫기</button>
    </div>
    <div class="stats-row" id="statsContent"></div>
  </section>

  <section class="panel backup-panel" id="backupPanel">
    <h2>백업 / 복원</h2>

    <div class="backup-actions">
      <button class="teal-btn" onclick="exportUserData()">추가 문제 내보내기(JSON)</button>
      <button class="purple-btn" onclick="document.getElementById('importFile').click()">추가 문제 불러오기(JSON)</button>
      <button class="red-btn" onclick="clearUserData()">추가 문제 전체 삭제</button>
    </div>

    <input type="file" id="importFile" accept=".json,application/json" style="display:none;" onchange="importUserData(event)">

    <div class="small-note">
      기본 문제는 <strong>questions.json</strong> 에서 불러옵니다.<br>
      여기서 내보내기/불러오기는 <strong>직접 추가한 문제만</strong> 대상입니다.
    </div>
  </section>
</main>

<button id="addBtn" onclick="openAddForm()">+</button>

<script>
const BASE_QUESTIONS_URL = "questions.json";
const USER_STORAGE_KEY = "flashcard_user_cards_v1";
const APP_STATE_KEY = "flashcard_app_state_v5";

let baseCards = [];
let userCards = [];
let cards = [];
let filteredCards = [];
let currentCard = null;
let currentMode = "quiz";
let orderMode = "random";
let currentSequenceIndex = -1;
let editingId = null;

function makeId(prefix = "user") {
  return prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function normalizeCard(card, source = "user") {
  return {
    id: card.id || makeId(source),
    source: card.source || source,
    subject: card.subject || "미분류",
    question: card.question || "",
    questionImage: card.questionImage || "",
    answer: card.answer || "",
    answerImage: card.answerImage || "",
    correctCount: Number(card.correctCount || 0),
    wrongCount: Number(card.wrongCount || 0)
  };
}

async function loadBaseCards() {
  try {
    const res = await fetch(BASE_QUESTIONS_URL + "?v=" + Date.now());
    if (!res.ok) throw new Error("questions.json 불러오기 실패");
    const data = await res.json();
    baseCards = Array.isArray(data)
      ? data.map(card => normalizeCard(card, "base"))
      : [];
  } catch (err) {
    console.error(err);
    baseCards = [];
    alert("questions.json 파일을 불러오지 못했습니다. 파일 이름과 JSON 형식을 확인하세요.");
  }
}

function loadUserCards() {
  const saved = localStorage.getItem(USER_STORAGE_KEY);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      userCards = Array.isArray(data)
        ? data.map(card => normalizeCard(card, "user"))
        : [];
    } catch {
      userCards = [];
    }
  } else {
    userCards = [];
  }
}

function saveUserCards() {
  localStorage.setItem(USER_STORAGE_KEY, JSON.stringify(userCards));
}

function loadAppState() {
  const saved = localStorage.getItem(APP_STATE_KEY);
  if (saved) {
    try {
      const state = JSON.parse(saved);
      orderMode = state.orderMode || "random";
    } catch {}
  }
}

function saveAppState() {
  localStorage.setItem(APP_STATE_KEY, JSON.stringify({ orderMode }));
}

function rebuildCards() {
  cards = [...baseCards, ...userCards];
}

function updateCount() {
  document.getElementById("countInfo").innerText = `전체 문제 수: ${cards.length}개`;
  document.getElementById("baseInfo").innerText = `기본(JSON) 문제 수: ${baseCards.length}개`;
  document.getElementById("userInfo").innerText = `추가 저장 문제 수: ${userCards.length}개`;
  document.getElementById("filteredInfo").innerText = `현재 필터 적용 문제 수: ${filteredCards.length}개`;
}

function updateModeText() {
  const modeName = currentMode === "quiz" ? "문제 모드" : "정답 보기 모드";
  const orderName = orderMode === "random" ? "랜덤" : "순서";
  document.getElementById("modeInfo").innerText = `현재 모드: ${modeName} / 출제 방식: ${orderName} 모드`;
}

function setMode(mode) {
  currentMode = mode;
  updateModeText();
  document.getElementById("result").innerText = "";
  clearAnswerInput();

  if (mode === "quiz") {
    document.getElementById("quizArea").style.display = "block";
    document.getElementById("viewerActions").style.display = "none";
    document.getElementById("cardModeText").innerText = "문제 모드입니다. 답을 입력하고 정답 확인을 누르세요.";
  } else {
    document.getElementById("quizArea").style.display = "none";
    document.getElementById("viewerActions").style.display = "flex";
    document.getElementById("cardModeText").innerText = "정답 보기 모드입니다. 문제와 정답이 함께 표시됩니다.";
  }
}

function changeOrderMode() {
  orderMode = document.getElementById("orderMode").value;
  currentSequenceIndex = -1;
  saveAppState();
  updateModeText();
}

function escapeHtml(text) {
  return (text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function renderImage(src, altText) {
  if (!src) return "";
  return `<img src="${src}" alt="${altText}">`;
}

function renderEmpty(message) {
  document.getElementById("card").innerHTML = `<div class="empty">${message}</div>`;
}

function renderQuestionOnly(card) {
  document.getElementById("card").innerHTML = `
    <div class="card-section">
      <div class="card-title">과목: ${escapeHtml(card.subject || "미분류")}</div>
      <div class="meta">구분: ${card.source === "base" ? "기본(JSON)" : "추가 저장"}</div>
      <div class="section-label">문제</div>
      <div class="card-text">${escapeHtml(card.question)}</div>
      ${renderImage(card.questionImage, "문제 이미지")}
    </div>
  `;
}

function renderQuestionAndAnswer(card) {
  document.getElementById("card").innerHTML = `
    <div class="card-section">
      <div class="card-title">과목: ${escapeHtml(card.subject || "미분류")}</div>
      <div class="meta">구분: ${card.source === "base" ? "기본(JSON)" : "추가 저장"}</div>
      <div class="section-label">문제</div>
      <div class="card-text">${escapeHtml(card.question)}</div>
      ${renderImage(card.questionImage, "문제 이미지")}
    </div>

    <div class="card-section">
      <div class="section-label">정답</div>
      <div class="card-text">${escapeHtml(card.answer)}</div>
      ${renderImage(card.answerImage, "정답 이미지")}
    </div>
  `;
}

function refreshSubjectOptions() {
  const select = document.getElementById("subjectFilter");
  const current = select.value;
  const uniqueSubjects = [...new Set(cards.map(c => (c.subject || "").trim()).filter(Boolean))].sort();

  select.innerHTML = `<option value="">전체 과목</option>`;
  uniqueSubjects.forEach(subject => {
    const option = document.createElement("option");
    option.value = subject;
    option.textContent = subject;
    select.appendChild(option);
  });

  if ([...select.options].some(opt => opt.value === current)) {
    select.value = current;
  }
}

function applyFilters() {
  const subject = document.getElementById("subjectFilter").value.trim().toLowerCase();
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

  filteredCards = cards.filter(card => {
    const subjectMatch = !subject || (card.subject || "").toLowerCase() === subject;
    const keywordTarget = `${card.subject} ${card.question} ${card.answer}`.toLowerCase();
    const keywordMatch = !keyword || keywordTarget.includes(keyword);
    return subjectMatch && keywordMatch;
  });

  currentSequenceIndex = -1;
  updateCount();

  if (document.getElementById("listPanel").style.display === "block") renderAllCardsList();
  if (document.getElementById("statsPanel").style.display === "block") renderStats();
}

function getNextCard() {
  if (filteredCards.length === 0) return null;

  if (orderMode === "random") {
    const index = Math.floor(Math.random() * filteredCards.length);
    return filteredCards[index];
  }

  currentSequenceIndex++;
  if (currentSequenceIndex >= filteredCards.length) currentSequenceIndex = 0;
  return filteredCards[currentSequenceIndex];
}

function drawNextCard() {
  if (filteredCards.length === 0) {
    renderEmpty("현재 필터 조건에 맞는 문제가 없습니다.");
    return;
  }

  currentCard = getNextCard();
  document.getElementById("result").innerText = "";
  clearAnswerInput();

  if (currentMode === "quiz") {
    renderQuestionOnly(currentCard);
    document.getElementById("quizArea").style.display = "block";
    document.getElementById("viewerActions").style.display = "none";
  } else {
    renderQuestionAndAnswer(currentCard);
    document.getElementById("quizArea").style.display = "none";
    document.getElementById("viewerActions").style.display = "flex";
  }
}

function clearAnswerInput() {
  document.getElementById("answerInput").value = "";
}

function updateStatsToStorage(cardId, isCorrect) {
  let updated = false;

  baseCards = baseCards.map(card => {
    if (card.id === cardId) {
      updated = true;
      return {
        ...card,
        correctCount: card.correctCount + (isCorrect ? 1 : 0),
        wrongCount: card.wrongCount + (isCorrect ? 0 : 1)
      };
    }
    return card;
  });

  if (!updated) {
    userCards = userCards.map(card => {
      if (card.id === cardId) {
        return {
          ...card,
          correctCount: card.correctCount + (isCorrect ? 1 : 0),
          wrongCount: card.wrongCount + (isCorrect ? 0 : 1)
        };
      }
      return card;
    });
    saveUserCards();
  }

  rebuildCards();
  applyFilters();
}

function checkAnswer() {
  if (!currentCard) {
    alert("먼저 문제 시작 / 다음 문제 버튼을 눌러 문제를 불러오세요.");
    return;
  }

  const userAnswer = document.getElementById("answerInput").value.trim();
  if (!userAnswer) {
    alert("답을 입력하세요.");
    return;
  }

  const correctAnswer = (currentCard.answer || "").trim();
  const result = document.getElementById("result");
  const isCorrect = userAnswer === correctAnswer;

  updateStatsToStorage(currentCard.id, isCorrect);

  if (isCorrect) {
    result.className = "result correct";
    result.innerText = `정답입니다.\n\n정답: ${correctAnswer}`;
  } else {
    result.className = "result wrong";
    result.innerText = `오답입니다.\n\n정답: ${correctAnswer}`;
  }

  if (document.getElementById("statsPanel").style.display === "block") renderStats();
  if (document.getElementById("listPanel").style.display === "block") renderAllCardsList();
}

function toggleAddForm() {
  const panel = document.getElementById("addForm");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function openAddForm() {
  resetForm();
  editingId = null;
  document.getElementById("formTitle").innerText = "문제 추가";
  document.getElementById("addForm").style.display = "block";
}

function previewImage(event, previewId) {
  const file = event.target.files[0];
  const preview = document.getElementById(previewId);

  if (!file) {
    preview.innerHTML = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    preview.innerHTML = `<img src="${e.target.result}" alt="미리보기">`;
  };
  reader.readAsDataURL(file);
}

function fileToDataURL(file) {
  return new Promise(resolve => {
    if (!file) {
      resolve(null);
      return;
    }
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function resetForm() {
  editingId = null;
  document.getElementById("newSubject").value = "";
  document.getElementById("newQuestion").value = "";
  document.getElementById("newAnswer").value = "";
  document.getElementById("questionImage").value = "";
  document.getElementById("answerImage").value = "";
  document.getElementById("questionPreview").innerHTML = "";
  document.getElementById("answerPreview").innerHTML = "";
  document.getElementById("formTitle").innerText = "문제 추가";
}

async function saveCard() {
  const subject = document.getElementById("newSubject").value.trim() || "미분류";
  const question = document.getElementById("newQuestion").value.trim();
  const answer = document.getElementById("newAnswer").value.trim();
  const questionFile = document.getElementById("questionImage").files[0];
  const answerFile = document.getElementById("answerImage").files[0];

  if (!question && !questionFile) {
    alert("문제 내용 또는 문제 이미지를 넣어주세요.");
    return;
  }

  if (!answer && !answerFile) {
    alert("정답 내용 또는 정답 이미지를 넣어주세요.");
    return;
  }

  const newQuestionImage = await fileToDataURL(questionFile);
  const newAnswerImage = await fileToDataURL(answerFile);

  if (editingId) {
    const baseIndex = baseCards.findIndex(c => c.id === editingId);
    const userIndex = userCards.findIndex(c => c.id === editingId);

    if (baseIndex !== -1) {
      baseCards[baseIndex].subject = subject;
      baseCards[baseIndex].question = question;
      baseCards[baseIndex].answer = answer;
      if (newQuestionImage !== null) baseCards[baseIndex].questionImage = newQuestionImage;
      if (newAnswerImage !== null) baseCards[baseIndex].answerImage = newAnswerImage;
      alert("기본(JSON) 문제가 현재 브라우저 세션에서 수정되었습니다. 영구 반영하려면 questions.json도 직접 수정해야 합니다.");
    } else if (userIndex !== -1) {
      userCards[userIndex].subject = subject;
      userCards[userIndex].question = question;
      userCards[userIndex].answer = answer;
      if (newQuestionImage !== null) userCards[userIndex].questionImage = newQuestionImage;
      if (newAnswerImage !== null) userCards[userIndex].answerImage = newAnswerImage;
      saveUserCards();
      alert("추가 저장 문제가 수정되었습니다.");
    }
  } else {
    userCards.push({
      id: makeId("user"),
      source: "user",
      subject,
      question,
      questionImage: newQuestionImage || "",
      answer,
      answerImage: newAnswerImage || "",
      correctCount: 0,
      wrongCount: 0
    });
    saveUserCards();
    alert("문제가 저장되었습니다.");
  }

  rebuildCards();
  refreshSubjectOptions();
  applyFilters();
  resetForm();
  document.getElementById("addForm").style.display = "none";
}

function editCard(id) {
  const card = cards.find(c => c.id === id);
  if (!card) return;

  editingId = id;
  document.getElementById("formTitle").innerText = "문제 수정";
  document.getElementById("newSubject").value = card.subject || "";
  document.getElementById("newQuestion").value = card.question || "";
  document.getElementById("newAnswer").value = card.answer || "";

  document.getElementById("questionPreview").innerHTML = card.questionImage
    ? `<img src="${card.questionImage}" alt="문제 이미지">`
    : "";

  document.getElementById("answerPreview").innerHTML = card.answerImage
    ? `<img src="${card.answerImage}" alt="정답 이미지">`
    : "";

  document.getElementById("questionImage").value = "";
  document.getElementById("answerImage").value = "";
  document.getElementById("addForm").style.display = "block";
  window.scrollTo({ top: document.getElementById("addForm").offsetTop - 80, behavior: "smooth" });
}

function deleteCard(id) {
  const card = cards.find(c => c.id === id);
  if (!card) return;

  const ok = confirm(`정말 삭제하시겠습니까?\n\n과목: ${card.subject || "미분류"}\n문제: ${(card.question || "").slice(0, 30)}...`);
  if (!ok) return;

  if (card.source === "base") {
    baseCards = baseCards.filter(c => c.id !== id);
    alert("기본(JSON) 문제는 현재 브라우저 화면에서만 제거됩니다. 영구 반영하려면 questions.json에서도 삭제하세요.");
  } else {
    userCards = userCards.filter(c => c.id !== id);
    saveUserCards();
  }

  if (currentCard && currentCard.id === id) {
    currentCard = null;
    renderEmpty("문제가 삭제되었습니다. 다음 문제를 불러오세요.");
  }

  rebuildCards();
  refreshSubjectOptions();
  applyFilters();
  renderAllCardsList();
  renderStats();
}

function toggleListPanel() {
  const panel = document.getElementById("listPanel");
  if (panel.style.display === "block") {
    panel.style.display = "none";
    return;
  }
  renderAllCardsList();
  panel.style.display = "block";
}

function renderAllCardsList() {
  const listBox = document.getElementById("allCardsList");

  if (filteredCards.length === 0) {
    listBox.innerHTML = `<div class="empty" style="padding-top:30px;">현재 필터 기준으로 등록된 문제가 없습니다.</div>`;
    return;
  }

  let html = "";
  filteredCards.forEach((card, index) => {
    const total = (card.correctCount || 0) + (card.wrongCount || 0);
    const rate = total ? Math.round((card.correctCount || 0) / total * 100) : 0;

    html += `
      <div class="list-item">
        <div class="list-number">${index + 1}번 문제</div>
        <div class="meta">
          과목: ${escapeHtml(card.subject || "미분류")} /
          구분: ${card.source === "base" ? "기본(JSON)" : "추가 저장"} /
          정답 ${card.correctCount || 0} /
          오답 ${card.wrongCount || 0} /
          정답률 ${rate}%
        </div>

        <div class="section-label">문제</div>
        <div class="card-text">${escapeHtml(card.question || "")}</div>
        ${renderImage(card.questionImage, "문제 이미지")}

        <div class="section-label">정답</div>
        <div class="card-text">${escapeHtml(card.answer || "")}</div>
        ${renderImage(card.answerImage, "정답 이미지")}

        <div class="list-actions" style="margin-top:14px;">
          <button class="mode-btn" onclick="editCard('${card.id}')">수정</button>
          <button class="red-btn" onclick="deleteCard('${card.id}')">삭제</button>
        </div>
      </div>
    `;
  });

  listBox.innerHTML = html;
}

function toggleStatsPanel() {
  const panel = document.getElementById("statsPanel");
  if (panel.style.display === "block") {
    panel.style.display = "none";
    return;
  }
  renderStats();
  panel.style.display = "block";
}

function renderStats() {
  const box = document.getElementById("statsContent");
  const target = filteredCards;

  const totalCards = target.length;
  const totalCorrect = target.reduce((sum, c) => sum + (c.correctCount || 0), 0);
  const totalWrong = target.reduce((sum, c) => sum + (c.wrongCount || 0), 0);
  const totalSolved = totalCorrect + totalWrong;
  const overallRate = totalSolved ? Math.round((totalCorrect / totalSolved) * 100) : 0;

  const weakCards = [...target]
    .filter(c => (c.correctCount || 0) + (c.wrongCount || 0) > 0)
    .sort((a, b) => {
      const aTotal = (a.correctCount || 0) + (a.wrongCount || 0);
      const bTotal = (b.correctCount || 0) + (b.wrongCount || 0);
      const aRate = aTotal ? (a.correctCount || 0) / aTotal : 1;
      const bRate = bTotal ? (b.correctCount || 0) / bTotal : 1;
      return aRate - bRate;
    })
    .slice(0, 3);

  let weakHtml = weakCards.length
    ? weakCards.map(c => {
        const total = (c.correctCount || 0) + (c.wrongCount || 0);
        const rate = total ? Math.round((c.correctCount || 0) / total * 100) : 0;
        return `<div>${escapeHtml((c.question || "").slice(0, 30))}... (${rate}%)</div>`;
      }).join("")
    : `<div>아직 풀이 기록이 없습니다.</div>`;

  box.innerHTML = `
    <div class="stats-box"><strong>문제 수</strong><div>${totalCards}개</div></div>
    <div class="stats-box"><strong>총 정답 수</strong><div>${totalCorrect}회</div></div>
    <div class="stats-box"><strong>총 오답 수</strong><div>${totalWrong}회</div></div>
    <div class="stats-box"><strong>전체 정답률</strong><div>${overallRate}%</div></div>
    <div class="stats-box" style="min-width:260px;"><strong>취약 문제</strong>${weakHtml}</div>
  `;
}

function toggleBackupPanel() {
  const panel = document.getElementById("backupPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function exportUserData() {
  const dataStr = JSON.stringify(userCards, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "flashcard-user-backup.json";
  a.click();
  URL.revokeObjectURL(url);
}

function importUserData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) {
        alert("JSON 형식이 올바르지 않습니다.");
        return;
      }

      const normalized = imported.map(card => normalizeCard(card, "user"))
        .map(card => ({ ...card, id: card.id || makeId("user"), source: "user" }));

      userCards = [...userCards, ...normalized];
      saveUserCards();
      rebuildCards();
      refreshSubjectOptions();
      applyFilters();
      alert("추가 문제 불러오기가 완료되었습니다.");
    } catch {
      alert("JSON 파일을 읽는 중 오류가 발생했습니다.");
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function clearUserData() {
  const ok = confirm("직접 추가한 문제를 모두 삭제하시겠습니까?");
  if (!ok) return;

  userCards = [];
  saveUserCards();
  rebuildCards();
  refreshSubjectOptions();
  applyFilters();
  renderAllCardsList();
  renderStats();
  alert("추가 문제가 모두 삭제되었습니다.");
}

async function initializeApp() {
  loadAppState();
  document.getElementById("orderMode").value = orderMode;

  await loadBaseCards();
  loadUserCards();
  rebuildCards();
  refreshSubjectOptions();
  filteredCards = [...cards];
  updateCount();
  setMode("quiz");
  applyFilters();
}

initializeApp();
</script>
</body>
</html>
